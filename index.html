<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sunrise Pharmacy – Inventory System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #e8000d;
    --red-dark: #a50009;
    --red-glow: #ff1a24;
    --black: #050505;
    --dark: #0f0f0f;
    --card: #161616;
    --card2: #1e1e1e;
    --border: #2a0003;
    --border2: #3a0005;
    --text: #f0e8e8;
    --muted: #8a7070;
    --white: #ffffff;
    --success: #00c853;
    --warn: #ff9100;
    --info: #00b0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
  
  /* SCANLINE EFFECT */
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#2a0003 0%,#050505 70%)}
  .login-box{background:var(--card);border:1px solid var(--red-dark);border-top:3px solid var(--red);padding:48px 40px;width:420px;max-width:95vw;box-shadow:0 0 60px rgba(232,0,13,.15)}
  .login-logo{text-align:center;margin-bottom:32px}
  .login-logo .cross{font-size:3rem;color:var(--red);line-height:1}
  .login-logo h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:4px;color:var(--white);margin-top:8px}
  .login-logo p{color:var(--muted);font-size:.85rem;letter-spacing:2px;text-transform:uppercase}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;background:#0a0a0a;border:1px solid var(--border2);color:var(--text);padding:11px 14px;font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:.2s}
  .field input:focus,.field select:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(232,0,13,.15)}
  .field select option{background:#161616}
  .btn{width:100%;background:var(--red);color:#fff;border:none;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;cursor:pointer;transition:.2s;margin-top:8px}
  .btn:hover{background:var(--red-glow);box-shadow:0 0 20px rgba(232,0,13,.4)}
  .btn:active{transform:scale(.98)}
  .btn-outline{background:transparent;border:1px solid var(--red);color:var(--red)}
  .btn-outline:hover{background:rgba(232,0,13,.1)}
  .btn-sm{padding:6px 14px;font-size:.85rem;letter-spacing:1px;width:auto;font-family:'Rajdhani',sans-serif;font-weight:700}
  .btn-danger{background:#3a0005;color:var(--red)}
  .btn-danger:hover{background:var(--red);color:#fff}
  .btn-success{background:#003d1a;color:var(--success)}
  .btn-success:hover{background:var(--success);color:#000}
  .err{color:var(--red);font-size:.85rem;margin-top:10px;text-align:center}

  /* LAYOUT */
  .app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
  .sidebar-logo .s-cross{color:var(--red);font-size:1.5rem}
  .sidebar-logo h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:var(--white)}
  .sidebar-logo p{font-size:.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .sidebar-user{padding:14px 20px;border-bottom:1px solid var(--border);background:#0a0a0a}
  .sidebar-user .role-badge{display:inline-block;background:var(--red-dark);color:var(--white);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;margin-bottom:4px}
  .sidebar-user .uname{font-weight:700;font-size:1rem;color:var(--white)}
  nav{flex:1;padding:16px 0}
  nav a{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--muted);cursor:pointer;font-size:.95rem;font-weight:600;letter-spacing:.5px;border-left:3px solid transparent;transition:.15s;text-decoration:none}
  nav a:hover{color:var(--text);background:rgba(232,0,13,.05)}
  nav a.active{color:var(--red);background:rgba(232,0,13,.08);border-left-color:var(--red)}
  nav a .icon{font-size:1.1rem;width:20px;text-align:center}
  .sidebar-bottom{padding:16px 20px;border-top:1px solid var(--border)}
  .logout-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--muted);padding:8px;font-family:'Rajdhani',sans-serif;font-weight:600;cursor:pointer;font-size:.9rem;letter-spacing:1px;transition:.2s}
  .logout-btn:hover{border-color:var(--red);color:var(--red)}
  .main{flex:1;overflow-y:auto;background:var(--black)}
  .topbar{background:var(--dark);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;justify-content:space-between;align-items:center}
  .topbar h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--white)}
  .topbar .time{font-family:'Share Tech Mono',monospace;color:var(--muted);font-size:.85rem}
  .content{padding:28px}

  /* CARDS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
  .stat-card{background:var(--card);border:1px solid var(--border);padding:20px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--red)}
  .stat-card .s-label{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:8px}
  .stat-card .s-val{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--white);line-height:1}
  .stat-card .s-sub{font-size:.8rem;color:var(--muted);margin-top:4px}
  .stat-card.warn::before{background:var(--warn)}
  .stat-card.success::before{background:var(--success)}
  .stat-card.info::before{background:var(--info)}

  /* TABLE */
  .table-wrap{background:var(--card);border:1px solid var(--border);overflow:hidden}
  .table-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
  .table-header h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--white)}
  .search-bar{background:#0a0a0a;border:1px solid var(--border2);color:var(--text);padding:8px 14px;font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none;width:220px;transition:.2s}
  .search-bar:focus{border-color:var(--red)}
  table{width:100%;border-collapse:collapse}
  th{background:#0a0a0a;padding:11px 16px;text-align:left;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
  td{padding:11px 16px;border-bottom:1px solid rgba(42,0,3,.5);font-size:.95rem;vertical-align:middle}
  tr:hover td{background:rgba(232,0,13,.03)}
  tr:last-child td{border-bottom:none}
  .badge{display:inline-block;padding:2px 10px;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .badge-red{background:rgba(232,0,13,.15);color:var(--red);border:1px solid rgba(232,0,13,.3)}
  .badge-green{background:rgba(0,200,83,.12);color:var(--success);border:1px solid rgba(0,200,83,.3)}
  .badge-warn{background:rgba(255,145,0,.12);color:var(--warn);border:1px solid rgba(255,145,0,.3)}
  .badge-info{background:rgba(0,176,255,.12);color:var(--info);border:1px solid rgba(0,176,255,.3)}
  .actions{display:flex;gap:8px}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal{background:var(--card);border:1px solid var(--red-dark);border-top:3px solid var(--red);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(232,0,13,.2)}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--white)}
  .close-btn{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;line-height:1}
  .close-btn:hover{color:var(--red)}
  .modal-body{padding:24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-grid .full{grid-column:1/-1}
  .field-inline{display:flex;gap:10px;align-items:flex-end}

  /* PRESCRIPTION */
  .rx-form{background:var(--card);border:1px solid var(--border);padding:24px;margin-bottom:24px}
  .rx-form h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--white);margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .rx-item{display:grid;grid-template-columns:2fr 1fr auto;gap:10px;align-items:flex-end;margin-bottom:12px}
  .rx-receipt{background:var(--card);border:1px solid var(--border);padding:24px}
  .receipt-head{text-align:center;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px}
  .receipt-head h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;color:var(--white)}
  .receipt-head p{color:var(--muted);font-size:.8rem}
  .receipt-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(42,0,3,.4);font-size:.95rem}
  .receipt-total{display:flex;justify-content:space-between;padding:12px 0;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--red);letter-spacing:2px}
  .mono{font-family:'Share Tech Mono',monospace}

  /* REPORTS */
  .report-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .report-card{background:var(--card);border:1px solid var(--border);padding:20px}
  .report-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--white);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px}
  .bar-wrap{margin-bottom:10px}
  .bar-label{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px;color:var(--muted)}
  .bar-track{height:6px;background:#1e1e1e;border-radius:0}
  .bar-fill{height:6px;background:var(--red);transition:width .4s}
  .bar-fill.green{background:var(--success)}
  .no-data{color:var(--muted);text-align:center;padding:24px;font-size:.9rem}
  .alert-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(42,0,3,.4);font-size:.9rem}
  .alert-item:last-child{border-bottom:none}

  /* UTILS */
  .flex-gap{display:flex;gap:10px;flex-wrap:wrap}
  .mt{margin-top:20px}
  .red{color:var(--red)}
  .green{color:var(--success)}
  .warn-c{color:var(--warn)}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--dark)}
  ::-webkit-scrollbar-thumb{background:var(--red-dark)}
  .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
  .tab{padding:10px 20px;cursor:pointer;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:.15s}
  .tab.active{color:var(--red);border-bottom-color:var(--red)}
  .tab:hover:not(.active){color:var(--text)}
  @media(max-width:700px){
    .sidebar{display:none}
    .form-grid{grid-template-columns:1fr}
    .report-grid{grid-template-columns:1fr}
    .rx-item{grid-template-columns:1fr}
    .stats-grid{grid-template-columns:1fr 1fr}
  }
  .print-area{display:none}
  @media print{.print-area{display:block}.no-print{display:none}}
  .tag-input{display:flex;flex-wrap:wrap;gap:6px;background:#0a0a0a;border:1px solid var(--border2);padding:8px;min-height:42px}
  .sold-tag{background:rgba(232,0,13,.15);color:var(--red);padding:2px 8px;font-size:.8rem;cursor:pointer}
  .sold-tag:hover{background:rgba(232,0,13,.3)}
  .info-box{background:rgba(0,176,255,.05);border:1px solid rgba(0,176,255,.2);padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:var(--info)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=React;

// ── SEED DATA ───────────────────────────────────────────────────────────────
const USERS=[
  {id:1,username:'admin',password:'admin123',role:'Administrator',name:'Dr. Kamau Njoroge'},
  {id:2,username:'cashier',password:'cash123',role:'Cashier',name:'Jane Wanjiku'},
  {id:3,username:'finance',password:'fin123',role:'Financial Manager',name:'Peter Otieno'},
];

const CATEGORIES=['Antibiotics','Analgesics','Antihypertensives','Antiparasitics','Vitamins & Supplements',
  'Antidiabetics','Antihistamines','Gastrointestinal','Respiratory','Dermatology','Hospital Equipment','IV & Fluids','Other'];

const initMeds=[
  {id:1,name:'Amoxicillin 500mg',category:'Antibiotics',unit:'Tabs',buyPrice:25,sellPrice:45,stock:250,minStock:30,supplier:'Medisel Kenya',expiry:'2026-08-01',barcode:'AMX500',description:'Broad-spectrum antibiotic'},
  {id:2,name:'Paracetamol 500mg',category:'Analgesics',unit:'Tabs',buyPrice:5,sellPrice:12,stock:800,minStock:100,supplier:'Cosmos Pharma',expiry:'2026-12-01',barcode:'PCM500',description:'Pain & fever relief'},
  {id:3,name:'Ibuprofen 400mg',category:'Analgesics',unit:'Tabs',buyPrice:12,sellPrice:25,stock:300,minStock:50,supplier:'Cosmos Pharma',expiry:'2026-10-15',barcode:'IBU400',description:'Anti-inflammatory analgesic'},
  {id:4,name:'Amlodipine 5mg',category:'Antihypertensives',unit:'Tabs',buyPrice:18,sellPrice:35,stock:180,minStock:30,supplier:'Regal Pharma',expiry:'2027-01-01',barcode:'AML5MG',description:'Calcium channel blocker'},
  {id:5,name:'Metformin 500mg',category:'Antidiabetics',unit:'Tabs',buyPrice:10,sellPrice:22,stock:400,minStock:60,supplier:'Medisel Kenya',expiry:'2026-09-01',barcode:'MET500',description:'Type 2 diabetes management'},
  {id:6,name:'Artemether/Lumefantrine 20/120mg',category:'Antiparasitics',unit:'Tabs',buyPrice:85,sellPrice:150,stock:120,minStock:30,supplier:'Universal Pharma',expiry:'2026-07-01',barcode:'ALU2012',description:'Malaria treatment (AL)'},
  {id:7,name:'Cotrimoxazole 480mg',category:'Antibiotics',unit:'Tabs',buyPrice:8,sellPrice:18,stock:350,minStock:50,supplier:'Cosmos Pharma',expiry:'2026-11-01',barcode:'CTX480',description:'Antibiotic & antiprotozoal'},
  {id:8,name:'ORS Sachet',category:'Gastrointestinal',unit:'Sachets',buyPrice:15,sellPrice:30,stock:500,minStock:100,supplier:'KEBS Certified',expiry:'2027-03-01',barcode:'ORS001',description:'Oral rehydration salts'},
  {id:9,name:'Multivitamin Tabs',category:'Vitamins & Supplements',unit:'Tabs',buyPrice:6,sellPrice:15,stock:600,minStock:80,supplier:'Medisel Kenya',expiry:'2026-12-01',barcode:'MUV001',description:'Daily nutritional supplement'},
  {id:10,name:'Salbutamol Inhaler 100mcg',category:'Respiratory',unit:'Inhaler',buyPrice:280,sellPrice:450,stock:45,minStock:10,supplier:'Regal Pharma',expiry:'2026-08-15',barcode:'SAL100',description:'Bronchodilator for asthma'},
  {id:11,name:'Hydrocortisone Cream 1%',category:'Dermatology',unit:'Tube',buyPrice:90,sellPrice:160,stock:60,minStock:15,supplier:'Universal Pharma',expiry:'2027-02-01',barcode:'HYD1PC',description:'Topical corticosteroid'},
  {id:12,name:'Digital Thermometer',category:'Hospital Equipment',unit:'Pcs',buyPrice:350,sellPrice:650,stock:20,minStock:5,supplier:'MedEquip Ltd',expiry:'N/A',barcode:'DGT001',description:'Clinical digital thermometer'},
  {id:13,name:'Surgical Gloves (M) Box',category:'Hospital Equipment',unit:'Box',buyPrice:380,sellPrice:700,stock:30,minStock:10,supplier:'MedEquip Ltd',expiry:'2028-01-01',barcode:'SGL-M',description:'100 pcs latex surgical gloves'},
  {id:14,name:'Normal Saline 500ml',category:'IV & Fluids',unit:'Bag',buyPrice:120,sellPrice:220,stock:80,minStock:20,supplier:'Cosmos Pharma',expiry:'2026-10-01',barcode:'NS500',description:'0.9% NaCl IV fluid'},
  {id:15,name:'Metronidazole 400mg',category:'Antibiotics',unit:'Tabs',buyPrice:9,sellPrice:20,stock:200,minStock:40,supplier:'Medisel Kenya',expiry:'2026-09-15',barcode:'MTZ400',description:'Antibiotic for anaerobic infections'},
  {id:16,name:'Loratadine 10mg',category:'Antihistamines',unit:'Tabs',buyPrice:12,sellPrice:28,stock:150,minStock:30,supplier:'Regal Pharma',expiry:'2027-01-15',barcode:'LOR10',description:'Non-drowsy antihistamine'},
  {id:17,name:'Dextrose 5% 500ml',category:'IV & Fluids',unit:'Bag',buyPrice:130,sellPrice:230,stock:60,minStock:15,supplier:'Cosmos Pharma',expiry:'2026-11-01',barcode:'D5W500',description:'5% glucose IV solution'},
  {id:18,name:'BP Monitor (Manual)',category:'Hospital Equipment',unit:'Pcs',buyPrice:2800,sellPrice:4500,stock:8,minStock:2,supplier:'MedEquip Ltd',expiry:'N/A',barcode:'BPM001',description:'Sphygmomanometer'},
];

const initSales=[];
let nextId=19;let nextSaleId=1;

// ── HELPERS ──────────────────────────────────────────────────────────────────
const ksh=n=>`KSh ${Number(n).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const today=()=>new Date().toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'});
const now=()=>new Date().toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const dateStr=()=>new Date().toISOString().slice(0,10);

// ── ICON MAP ─────────────────────────────────────────────────────────────────
const Icon=({n})=>{
  const m={'💊':'💊','🏥':'🏥','🛒':'🛒','📊':'📊','🔔':'🔔','⚙️':'⚙️','🧾':'🧾','👤':'👤','➕':'➕','✏️':'✏️','🗑️':'🗑️','🔍':'🔍','📋':'📋','💰':'💰','📦':'📦','⚠️':'⚠️','✅':'✅','❌':'❌','🖨️':'🖨️'};
  return React.createElement('span',{style:{fontSize:'1rem'}},m[n]||n);
};

// ══════════════════════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════════════════════
function Login({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');
  const submit=e=>{
    e.preventDefault();
    const found=USERS.find(x=>x.username===u&&x.password===p);
    if(found)onLogin(found);else setErr('Invalid credentials. Try again.');
  };
  return React.createElement('div',{className:'login-wrap'},
    React.createElement('form',{className:'login-box',onSubmit:submit},
      React.createElement('div',{className:'login-logo'},
        React.createElement('div',{className:'cross'},'✚'),
        React.createElement('h1',null,'SUNRISE PHARMACY'),
        React.createElement('p',null,'Inventory Management System')
      ),
      React.createElement('div',{className:'info-box',style:{marginBottom:20}},
        React.createElement('strong',null,'Demo Accounts: '),'admin/admin123 · cashier/cash123 · finance/fin123'
      ),
      React.createElement('div',{className:'field'},
        React.createElement('label',null,'Username'),
        React.createElement('input',{value:u,onChange:e=>setU(e.target.value),placeholder:'Enter username',autoFocus:true})
      ),
      React.createElement('div',{className:'field'},
        React.createElement('label',null,'Password'),
        React.createElement('input',{type:'password',value:p,onChange:e=>setP(e.target.value),placeholder:'Enter password'})
      ),
      err&&React.createElement('div',{className:'err'},err),
      React.createElement('button',{className:'btn',type:'submit'},'SIGN IN')
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════════════════════════
function Modal({title,onClose,children,footer}){
  return React.createElement('div',{className:'overlay',onClick:e=>{if(e.target.className==='overlay')onClose()}},
    React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-head'},
        React.createElement('h3',null,title),
        React.createElement('button',{className:'close-btn',onClick:onClose},'✕')
      ),
      React.createElement('div',{className:'modal-body'},children),
      footer&&React.createElement('div',{className:'modal-foot'},footer)
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MEDICINE FORM
// ══════════════════════════════════════════════════════════════════════════════
function MedForm({med,onSave,onClose}){
  const[f,setF]=useState(med||{name:'',category:'Antibiotics',unit:'Tabs',buyPrice:'',sellPrice:'',stock:'',minStock:'',supplier:'',expiry:'',barcode:'',description:''});

// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[meds,setMeds]=useState(initMeds);
  const[sales,setSales]=useState(initSales);
  const[tick,setTick]=useState(now());

  useEffect(()=>{const t=setInterval(()=>setTick(now()),1000);return()=>clearInterval(t);},[]);

  if(!user)return React.createElement(Login,{onLogin:u=>{setUser(u);setPage('dashboard');}});

  const role=user.role;
  const canSee=p=>{
    if(p==='inventory')return true;
    if(p==='prescription')return role==='Administrator'||role==='Cashier';
    if(p==='sales')return true;
    if(p==='finance')return role==='Administrator'||role==='Financial Manager';
    if(p==='dashboard')return true;
    return false;
  };

  const pages=[
    {id:'dashboard',icon:'🏥',label:'Dashboard'},
    {id:'inventory',icon:'💊',label:'Inventory'},
    {id:'prescription',icon:'📋',label:'Dispense Rx'},
    {id:'sales',icon:'🧾',label:'Sales History'},
    {id:'finance',icon:'📊',label:'Financial Reports'},
  ].filter(p=>canSee(p.id));

  const pageTitle={dashboard:'Dashboard',inventory:'Inventory',prescription:'Dispense Prescription',sales:'Sales History',finance:'Financial Reports'};

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'sidebar'},
      React.createElement('div',{className:'sidebar-logo'},
        React.createElement('span',{className:'s-cross'},'✚ '),
        React.createElement('h2',null,'SUNRISE'),
        React.createElement('p',null,'Pharmacy System')
      ),
      React.createElement('div',{className:'sidebar-user'},
        React.createElement('div',{className:'role-badge'},role),
        React.createElement('div',{className:'uname'},user.name)
      ),
      React.createElement('nav',null,
        pages.map(p=>React.createElement('a',{key:p.id,className:`${page===p.id?'active':''}`,onClick:()=>setPage(p.id)},
          React.createElement('span',{className:'icon'},p.icon),p.label
        ))
      ),
      React.createElement('div',{className:'sidebar-bottom'},
        React.createElement('button',{className:'logout-btn',onClick:()=>setUser(null)},'⬅ Sign Out')
      )
    ),
    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('h2',null,pageTitle[page]||''),
        React.createElement('span',{className:'time'},tick)
      ),
      React.createElement('div',{className:'content'},
        page==='dashboard'&&React.createElement(Dashboard,{meds,sales,user}),
        page==='inventory'&&React.createElement(InventoryPage,{meds,setMeds,role}),
        page==='prescription'&&React.createElement(PrescriptionPage,{meds,setMeds,sales,setSales,user}),
        page==='sales'&&React.createElement(SalesPage,{sales}),
        page==='finance'&&React.createElement(FinancePage,{meds,sales}),
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
